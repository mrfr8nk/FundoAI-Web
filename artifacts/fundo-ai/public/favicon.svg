<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Bot icon (Lucide) centred and scaled -->
  <!-- Head -->
  <rect x="7" y="11" width="18" height="13" rx="2.5" stroke="white" stroke-width="1.8" fill="none"/>
  <!-- Antenna -->
  <line x1="16" y1="7" x2="16" y2="11" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="16" cy="6.5" r="1.2" fill="white"/>
  <!-- Eyes -->
  <circle cx="12" cy="17" r="1.5" fill="white"/>
  <circle cx="20" cy="17" r="1.5" fill="white"/>
  <!-- Mouth bar -->
  <line x1="12" y1="21" x2="20" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="7" y1="15" x2="4" y2="15" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="25" y1="15" x2="28" y2="15" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
